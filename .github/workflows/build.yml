name: Build

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OpenCV SDK is NOT committed (it's ~1 GB); fetch it before building. On a fresh checkout the
      # target dir is absent, so setup_libs.sh downloads non-interactively.
      - name: Fetch OpenCV SDK
        run: |
          chmod +x setup_libs.sh && ./setup_libs.sh
          # OpenCV's SDK bundles sample Gradle projects that ship their own gradle-wrapper.jar,
          # which trips gradle/actions wrapper-validation. They aren't needed to build — remove them.
          rm -rf core/nativebridge/libs/opencv/samples || true
          find core/nativebridge/libs/opencv -name 'gradle-wrapper.jar' -delete || true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (unit tests + debug APK)
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --continue --build-cache
