name: Build

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OpenCV (Java + native via Prefab) is a plain Maven Central dependency now — Gradle resolves
      # it during the build, so there is nothing to fetch or vendor here.

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build (unit tests + debug APK)
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --continue --build-cache
